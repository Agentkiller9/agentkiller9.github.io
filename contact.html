<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Mugtaba Shaikeldin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="text-gray-100 text-base min-h-screen">

    <!-- Navigation Bar -->
    <nav class="bg-card bg-opacity-80 backdrop-blur-lg sticky top-0 z-50 border-b border-gray-700/50">
        <div class="container mx-auto px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center">
                    <a class="text-accent font-bold text-xl" href="index.html">Mugtaba Shaikeldin</a>
                </div>
                <div class="hidden md:flex items-center space-x-8">
                    <a href="index.html" class="text-white hover:text-accent transition">Portfolio</a>
                    <a href="projects.html" class="text-white hover:text-accent transition">Projects</a>
                    <a href="blog.html" class="text-white hover:text-accent transition">Blog</a>
                    <a href="contact.html" class="text-white hover:text-accent transition">Contact</a>
                </div>
                <div class="md:hidden flex items-center">
                    <button id="mobile-menu-button" class="text-white hover:text-accent focus:outline-none">
                        <i class="fas fa-bars text-xl"></i>
                    </button>
                </div>
            </div>
        </div>
        <!-- Mobile Menu -->
        <div id="mobile-menu" class="hidden md:hidden">
            <a href="index.html" class="block py-2 px-8 text-sm text-white hover:bg-gray-700">Portfolio</a>
            <a href="projects.html" class="block py-2 px-8 text-sm text-white hover:bg-gray-700">Projects</a>
            <a href="blog.html" class="block py-2 px-8 text-sm text-white hover:bg-gray-700">Blog</a>
            <a href="contact.html" class="block py-2 px-8 text-sm text-white hover:bg-gray-700">Contact</a>
        </div>
    </nav>

    <!-- Contact Header -->
    <header class="header-animated-gradient text-center py-20">
        <div class="container mx-auto px-8">
            <h1 class="text-5xl font-extrabold text-white">Get In Touch</h1>
            <p class="text-xl text-accent mt-2">I'm always open to discussing new projects, creative ideas, or opportunities.</p>
        </div>
    </header>

    <main class="container mx-auto px-8 py-16">
        <div class="max-w-xl mx-auto">
            <form action="https://formspree.io/f/mugtaba.shaikeldin@outlook.com" method="POST" class="bg-card p-8 rounded-lg shadow-lg">
                <div class="mb-4">
                    <label for="name" class="block text-white text-sm font-bold mb-2">Name</label>
                    <input type="text" id="name" name="name" class="w-full bg-gray-800 border border-gray-600 rounded-lg px-4 py-2 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-accent" required>
                </div>
                <div class="mb-4">
                    <label for="email" class="block text-white text-sm font-bold mb-2">Email</label>
                    <input type="email" id="email" name="email" class="w-full bg-gray-800 border border-gray-600 rounded-lg px-4 py-2 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-accent" required>
                </div>
                <div class="mb-4">
                    <label for="message" class="block text-white text-sm font-bold mb-2">Message</label>
                    <textarea id="message" name="message" rows="5" class="w-full bg-gray-800 border border-gray-600 rounded-lg px-4 py-2 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-accent" required></textarea>
                </div>
                <div class="text-center">
                    <button type="submit" class="btn-hollow font-bold py-3 px-8 rounded-full shadow-lg transition duration-300">
                        Send Message <i class="fas fa-paper-plane ml-2"></i>
                    </button>
                </div>
            </form>
        </div>
    </main>

    <footer class="text-center py-8 border-t border-gray-800/50">
        <p class="text-gray-500 text-sm">&copy; 2026 Mugtaba Shaikeldin. All Rights Reserved.</p>
    </footer>

    <button id="to-top-button" title="Go To Top"
        class="hidden fixed bottom-8 right-8 w-12 h-12 rounded-full bg-accent text-white justify-center items-center cursor-pointer text-2xl z-50">
        <i class="fas fa-arrow-up"></i>
    </button>


    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
