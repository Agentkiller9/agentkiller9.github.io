<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog | Mugtaba Shaikeldin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="text-gray-100 text-base min-h-screen">

    <!-- Navigation Bar -->
    <nav class="bg-card bg-opacity-80 backdrop-blur-lg sticky top-0 z-50 border-b border-gray-700/50">
        <div class="container mx-auto px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center">
                    <a class="text-accent font-bold text-xl" href="index.html">Mugtaba Shaikeldin</a>
                </div>
                <div class="hidden md:flex items-center space-x-8">
                    <a href="index.html" class="text-white hover:text-accent transition">Portfolio</a>
                    <a href="blog.html" class="text-white hover:text-accent transition">Blog</a>
                </div>
                <div class="md:hidden flex items-center">
                    <button id="mobile-menu-button" class="text-white hover:text-accent focus:outline-none">
                        <i class="fas fa-bars text-xl"></i>
                    </button>
                </div>
            </div>
        </div>
        <!-- Mobile Menu -->
        <div id="mobile-menu" class="hidden md:hidden">
            <a href="index.html" class="block py-2 px-8 text-sm text-white hover:bg-gray-700">Portfolio</a>
            <a href="blog.html" class="block py-2 px-8 text-sm text-white hover:bg-gray-700">Blog</a>
        </div>
    </nav>

    <!-- Blog Header -->
    <header class="header-animated-gradient text-center py-20">
        <div class="container mx-auto px-8">
            <h1 class="text-5xl font-extrabold text-white">Cyber Security Blog</h1>
            <p class="text-xl text-accent mt-2">Insights, CTF Write-ups, and Technical Deep Dives</p>
        </div>
    </header>

    <main class="container mx-auto px-8 py-16">
        <!-- Search and Filter -->
        <div class="mb-12 flex flex-col md:flex-row gap-4">
            <input type="text" id="search-bar" class="w-full md:w-2/3 bg-card border border-gray-600 rounded-lg px-4 py-2 text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-accent" placeholder="Search posts...">
            <select id="category-filter" class="w-full md:w-1/3 bg-card border border-gray-600 rounded-lg px-4 py-2 text-white focus:outline-none focus:ring-2 focus:ring-accent">
                <option value="all">All Categories</option>
                <!-- Categories will be populated by JavaScript -->
            </select>
        </div>

        <!-- Blog Posts Grid -->
        <div id="posts-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- Posts will be loaded here by JavaScript -->
        </div>
    </main>

    <footer class="text-center py-8 border-t border-gray-800/50">
        <p class="text-gray-500 text-sm">&copy; 2026 Mugtaba Shaikeldin. All Rights Reserved.</p>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
