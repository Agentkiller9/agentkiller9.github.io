<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
    <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#050507"/>
            <stop offset="50%" stop-color="#1a0000"/>
            <stop offset="100%" stop-color="#050507"/>
        </linearGradient>
        <radialGradient id="glow" cx="50%" cy="40%" r="60%">
            <stop offset="0%" stop-color="#ff2a2a" stop-opacity="0.25"/>
            <stop offset="100%" stop-color="#ff2a2a" stop-opacity="0"/>
        </radialGradient>
    </defs>

    <rect width="1200" height="630" fill="url(#bg)"/>
    <rect width="1200" height="630" fill="url(#glow)"/>

    <!-- subtle grid -->
    <g stroke="#ff2a2a" stroke-opacity="0.08" stroke-width="1">
        <line x1="0"   y1="0" x2="0"   y2="630"/>
        <line x1="100" y1="0" x2="100" y2="630"/>
        <line x1="200" y1="0" x2="200" y2="630"/>
        <line x1="300" y1="0" x2="300" y2="630"/>
        <line x1="400" y1="0" x2="400" y2="630"/>
        <line x1="500" y1="0" x2="500" y2="630"/>
        <line x1="600" y1="0" x2="600" y2="630"/>
        <line x1="700" y1="0" x2="700" y2="630"/>
        <line x1="800" y1="0" x2="800" y2="630"/>
        <line x1="900" y1="0" x2="900" y2="630"/>
        <line x1="1000" y1="0" x2="1000" y2="630"/>
        <line x1="1100" y1="0" x2="1100" y2="630"/>
        <line x1="0" y1="100" x2="1200" y2="100"/>
        <line x1="0" y1="200" x2="1200" y2="200"/>
        <line x1="0" y1="300" x2="1200" y2="300"/>
        <line x1="0" y1="400" x2="1200" y2="400"/>
        <line x1="0" y1="500" x2="1200" y2="500"/>
    </g>

    <!-- terminal prompt -->
    <text x="100" y="210" font-family="ui-monospace, Menlo, monospace" font-size="32" fill="#ff2a2a" letter-spacing="2">&gt; whoami</text>

    <!-- name -->
    <text x="100" y="320" font-family="system-ui, -apple-system, Segoe UI, sans-serif" font-size="92" font-weight="800" fill="#ffffff">Mugtaba Shaikeldin</text>

    <!-- title -->
    <text x="100" y="400" font-family="ui-monospace, Menlo, monospace" font-size="38" fill="#ff2a2a">Cybersecurity · Pentester · DFIR</text>

    <!-- url -->
    <text x="100" y="540" font-family="ui-monospace, Menlo, monospace" font-size="26" fill="#9ca3af">agentkiller9.github.io</text>

    <!-- decorative bracket -->
    <g stroke="#ff2a2a" stroke-width="4" fill="none">
        <path d="M 1050 240 L 1100 240 L 1100 410 L 1050 410"/>
    </g>

    <!-- cursor -->
    <rect x="940" y="290" width="14" height="44" fill="#ff2a2a"/>
</svg>
