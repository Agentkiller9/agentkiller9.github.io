<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link rel="icon" type="image/svg+xml" href="/favicon.svg">

<body class="text-gray-100 min-h-screen flex items-center justify-center">

    <main class="container mx-auto px-4 sm:px-8 py-16 text-center">

            <p class="font-mono text-red-400 text-sm sm:text-base mb-6">
                cat: <span id="missing-path-2">/requested/page</span>: No such file or directory
            </p>

            <h1 class="text-5xl sm:text-7xl font-extrabold text-white mb-3 font-mono">
                4<span class="text-accent">0</span>4

            <p class="font-mono text-accent text-sm mb-2">

            <div class="flex flex-wrap gap-3 mt-6">

                    <i class="fas fa-newspaper mr-2" aria-hidden="true"></i> Blog
                </a>
            </div>
        </div>
    </main>

    <script>
        const path = window.location.pathname || '/requested/page';
        document.getElementById('missing-path').textContent = path;
        document.getElementById('missing-path-2').textContent = path;
    </script>
</body>
